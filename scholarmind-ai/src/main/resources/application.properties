# Scholarmind AI - Application Properties
# These are fallback values; override via environment variables or application.yml

# Server
server.port=8080

# Application
spring.application.name=scholarmind-ai

# Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=deepseek-r1:7b
spring.ai.ollama.embedding.model=bge-m3

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/scholarmind
spring.datasource.username=scholar
spring.datasource.password=scholar_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# Logging
logging.level.com.springai.scholarmind=DEBUG
