server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: scholarmind-ai

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:deepseek-r1:7b}
      embedding:
        model: bge-m3
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        model: ${SPRING_AI_OPENAI_MODEL:gpt-4o}
    vectorstore:
      pgvector:
        index-type: IVFFlat
        distance-type: COSINE_DISTANCE
        dimension: 768

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/scholarmind}
    username: ${POSTGRES_USER:scholar}
    password: ${POSTGRES_PASSWORD:scholar_secret}
    driver-class-name: org.postgresql.Driver

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.springai.scholarmind: DEBUG
    org.springframework.ai: INFO
